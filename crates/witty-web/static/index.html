<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Witty Web Smoke</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #101317;
        color: #d7dde7;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
      }

      body {
        display: grid;
        place-items: center;
      }

      main {
        position: relative;
        width: min(960px, calc(100vw - 32px));
      }

      canvas {
        display: block;
        width: 100%;
        height: 540px;
        background: #05070a;
        border: 1px solid #2b3440;
      }

      canvas:focus {
        outline: 2px solid #8fb3ff;
        outline-offset: 2px;
      }

      body[data-witty-picker="active"] canvas {
        opacity: 0.35;
        pointer-events: none;
      }

      body[data-witty-import="active"] canvas {
        opacity: 0.35;
        pointer-events: none;
      }

      main:focus-within canvas {
        outline: 2px solid #8fb3ff;
        outline-offset: 2px;
      }

      #witty-profile-picker,
      #witty-profile-import {
        display: grid;
        gap: 12px;
        margin-bottom: 14px;
        padding: 14px;
        border: 1px solid #364150;
        background: #171c23;
      }

      .profile-picker-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      .profile-picker-header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .profile-picker-count,
      .profile-picker-meta,
      .profile-picker-message {
        color: #9aa7b8;
        font-size: 12px;
      }

      .profile-picker-list {
        display: grid;
        gap: 8px;
      }

      .profile-picker-option {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 54px;
        padding: 10px 12px;
        border: 1px solid #3b4656;
        border-radius: 6px;
        background: #202731;
        color: #d7dde7;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      .profile-picker-option:hover:not(:disabled),
      .profile-picker-option:focus {
        border-color: #8fb3ff;
        outline: none;
      }

      .profile-picker-option:disabled {
        color: #7d8898;
        cursor: not-allowed;
        opacity: 0.76;
      }

      .profile-picker-option-main {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .profile-picker-name,
      .profile-picker-meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .profile-picker-state {
        color: #8fb3ff;
        font-size: 12px;
      }

      .profile-picker-empty {
        margin: 0;
        color: #9aa7b8;
      }

      .profile-picker-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .profile-picker-import-action {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid #3b4656;
        border-radius: 6px;
        background: #202731;
        color: #d7dde7;
        font: inherit;
        cursor: pointer;
      }

      .profile-picker-import-action:hover:not(:disabled),
      .profile-picker-import-action:focus {
        border-color: #8fb3ff;
        outline: none;
      }

      .profile-picker-import-action:disabled {
        color: #7d8898;
        cursor: not-allowed;
        opacity: 0.76;
      }

      .profile-import-option {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        min-height: 46px;
        padding: 10px 12px;
        border: 1px solid #3b4656;
        border-radius: 6px;
        background: #202731;
      }

      .profile-import-option:focus-within {
        border-color: #8fb3ff;
      }

      .profile-import-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .profile-import-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .profile-import-summary-item {
        min-height: 24px;
        padding: 3px 8px;
        border: 1px solid #3b4656;
        border-radius: 6px;
        background: #202731;
        color: #b8c2d2;
        font-size: 12px;
        line-height: 16px;
      }

      .profile-import-result {
        min-height: 30px;
        padding: 6px 8px;
        border: 1px solid #3b4656;
        border-radius: 6px;
        background: #202731;
        color: #d7dde7;
        font-size: 12px;
        line-height: 18px;
      }

      .profile-import-conflict,
      .profile-import-confirm,
      .profile-import-next-picker {
        min-height: 34px;
        border: 1px solid #3b4656;
        border-radius: 6px;
        background: #202731;
        color: #d7dde7;
        font: inherit;
      }

      .profile-import-conflict {
        display: inline-flex;
        align-items: stretch;
        padding: 2px;
        overflow: hidden;
      }

      .profile-import-conflict-option {
        min-width: 64px;
        padding: 0 10px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #b8c2d2;
        cursor: pointer;
        font: inherit;
      }

      .profile-import-conflict-option:hover:not(:disabled),
      .profile-import-conflict-option:focus {
        color: #f5f7fb;
        outline: none;
      }

      .profile-import-conflict-option.is-active {
        background: #8fb3ff;
        color: #111827;
      }

      .profile-import-conflict-option:disabled {
        cursor: not-allowed;
        opacity: 0.76;
      }

      .profile-import-confirm,
      .profile-import-next-picker {
        padding: 0 12px;
        cursor: pointer;
      }

      .profile-import-confirm:disabled,
      .profile-import-next-picker:disabled {
        color: #7d8898;
        cursor: not-allowed;
        opacity: 0.76;
      }

      #witty-ime-input {
        position: absolute;
        z-index: 1;
        width: 1px;
        height: 18px;
        min-width: 1px;
        min-height: 1px;
        padding: 0;
        border: 0;
        outline: 0;
        font-size: 16px;
        line-height: 18px;
        opacity: 0.01;
        color: transparent;
        caret-color: transparent;
        background: transparent;
        pointer-events: none;
        resize: none;
        touch-action: none;
        transform: translateZ(0);
      }

      #status {
        min-height: 20px;
        margin-top: 10px;
        color: #8fb3ff;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="witty-canvas" width="960" height="540" tabindex="0"></canvas>
      <input
        id="witty-ime-input"
        aria-hidden="true"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="text"
      />
      <div id="status">starting</div>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#2E2E2E"/>

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Filament wave distortion filter -->
    <filter id="filament" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Create turbulence for wave effect -->
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="turbulence"/>
      <!-- Apply displacement for wavy edges -->
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <!-- Add glow -->
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="displaced"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Light bulb -->
  <g transform="translate(100, 100)">
    <!-- Bulb glass (dark edge) -->
    <circle cx="0" cy="-10" r="50" fill="#3A3A3A" stroke="#1A1A1A" stroke-width="4"/>

    <!-- Bulb glass (lighter center) -->
    <circle cx="0" cy="-10" r="38" fill="#4A4A4A"/>

    <!-- Glowing "W" filament with wave effect -->
    <text x="0" y="-2"
          text-anchor="middle"
          font-family="Arial, sans-serif"
          font-size="52"
          font-weight="bold"
          fill="#FFD700"
          filter="url(#filament)">W</text>

    <!-- Additional glow layer -->
    <text x="0" y="-2"
          text-anchor="middle"
          font-family="Arial, sans-serif"
          font-size="52"
          font-weight="bold"
          fill="#FFD700"
          opacity="0.4"
          filter="url(#glow)">W</text>

    <!-- Bulb base -->
    <rect x="-18" y="36" width="36" height="8" rx="2" fill="#555"/>
    <rect x="-16" y="44" width="32" height="6" rx="2" fill="#666"/>
    <rect x="-14" y="50" width="28" height="5" rx="2" fill="#777"/>
    <rect x="-12" y="55" width="24" height="5" rx="2" fill="#888"/>

    <!-- Screw threads -->
    <rect x="-20" y="36" width="40" height="2" fill="#444"/>
    <rect x="-19" y="44" width="38" height="2" fill="#444"/>
    <rect x="-18" y="50" width="36" height="2" fill="#444"/>
  </g>

  <!-- Prompt cursor (underscore) -->
  <rect x="160" y="165" width="60" height="8" fill="#4CAF50" opacity="0.9"/>
</svg>